name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted
    # Prevent concurrent deploys; cancel in-progress if new push arrives
    concurrency:
      group: deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Run deploy script
        run: bash scripts/deploy.sh
