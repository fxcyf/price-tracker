# Auto-deploy on push to master via self-hosted runner
name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted
    concurrency:
      group: deploy
      cancel-in-progress: true
    env:
      PROJECT_DIR: /home/fxcyf/MyFiles/random/price-tracker
    steps:
      - name: Deploy
        run: bash $PROJECT_DIR/scripts/deploy.sh
