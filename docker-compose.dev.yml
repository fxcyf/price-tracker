services:
  db:
    ports:
      - "5433:5432"

  redis:
    ports:
      - "6380:6379"

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8001:8000"
    env_file:
      - .env.dev

  worker:
    command: celery -A app.tasks.celery_app worker --loglevel=debug --concurrency=2
    env_file:
      - .env.dev

  beat:
    command: celery -A app.tasks.celery_app beat --loglevel=debug
    env_file:
      - .env.dev

  nginx:
    ports:
      - "8080:80"
